<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feedback</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f7fb;
}

/* HEADER */

header{
    background:linear-gradient(135deg,#1f2f46,#2c3e50);
    color:white;
    padding:20px;
    text-align:center;
}

header h1 span{
    color:#3498db;
}

/* MAIN */

.container{
    width:90%;
    max-width:800px;
    margin:40px auto;
}

.feedback-box{
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

.feedback-box h2{
    text-align:center;
    margin-bottom:30px;
    color:#2c3e50;
}

/* FORM */

.form-group{
    margin-bottom:25px;
}

.form-group label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
    color:#2c3e50;
}

input,
textarea{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

textarea{
    height:150px;
    resize:none;
}

/* STAR RATING */

.rating{
    display:flex;
    gap:10px;
    font-size:30px;
    color:#f1c40f;
}

/* BUTTON */

.submit-btn{
    width:100%;
    padding:15px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:#217dbb;
}

/* BACK BUTTON */

.back-btn{
    display:inline-block;
    margin-top:25px;
    text-decoration:none;
    background:#2c3e50;
    color:white;
    padding:12px 20px;
    border-radius:8px;
}

.back-btn:hover{
    background:#1f2f46;
}

</style>

</head>

<body>

<header>

<h1>Virtual <span>Labs</span></h1>

</header>

<div class="container">

<div class="feedback-box">

<h2>Feedback Form</h2>

<form>

<div class="form-group">

<label>Enter Your Name</label>

<input type="text" placeholder="Enter your name" required>

</div>

<div class="form-group">

<label>Rate Your Experience</label>

<div class="rating">

<i class="fas fa-star"></i>
<i class="fas fa-star"></i>
<i class="fas fa-star"></i>
<i class="fas fa-star"></i>
<i class="fas fa-star"></i>

</div>

</div>

<div class="form-group">

<label>What was your key takeaway from this Virtual Lab?</label>

<textarea
placeholder="Write your feedback here..."
required></textarea>

</div>

<button type="submit" class="submit-btn">

Submit Feedback

</button>

</form>

<a href="project.html" class="back-btn">

← Back to Project

</a>

</div>

</div>

</body>

</html>
